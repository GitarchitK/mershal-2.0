name: Auto Publish Articles

on:
  # schedule:
  #   # 4 runs per day = ~8 articles/day
  #   # Times in UTC (IST = UTC+5:30)
  #   - cron: '0 3 * * *'   # 8:30 AM IST
  #   - cron: '0 7 * * *'   # 12:30 PM IST
  #   - cron: '0 12 * * *'  # 5:30 PM IST
  #   - cron: '0 17 * * *'  # 10:30 PM IST
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of articles to publish'
        required: false
        default: '2'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish articles from Google Trends
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          GOOGLE_INDEXING_EMAIL: ${{ secrets.GOOGLE_INDEXING_EMAIL }}
          GOOGLE_INDEXING_PRIVATE_KEY: ${{ secrets.GOOGLE_INDEXING_PRIVATE_KEY }}
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          COUNT=${{ github.event.inputs.count || '2' }}
          echo "📰 Publishing $COUNT articles from Google Trends..."
          node automation/auto-publish.js $COUNT

      - name: Summary
        run: echo "✅ Auto-publish complete"
